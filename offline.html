<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuizBlast — Offline</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #0a0b12;
      color: #e2e8f0;
      font-family: 'Exo 2', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .icon  { font-size: 4rem; margin-bottom: 16px; }
    h1     { font-size: 1.4rem; color: #00f5c4; margin-bottom: 8px; letter-spacing: 2px; }
    p      { color: #94a3b8; font-size: .9rem; margin-bottom: 24px; }
    button {
      background: #00f5c4;
      color: #000;
      border: none;
      border-radius: 12px;
      padding: 12px 28px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>YOU'RE OFFLINE</h1>
  <p>Check your connection and try again.<br/>Your local progress is safe!</p>
  <button onclick="location.reload()">🔄 Try Again</button>
</body>
</html>
